<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foodie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    /* Header */
    header {
      background: #1a1a1a;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-style: italic;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: orange;
    }

    /* Layout */
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    /* Left Section */
    .left {
      flex: 2;
      position: relative;
    }

    .left img {
      width: 100%;
      border-radius: 10px;
    }

    .tag {
      position: absolute;
      top: 15px;
      left: 15px;
      background: orange;
      color: #000;
      padding: 5px 10px;
      font-weight: bold;
      border-radius: 5px;
    }

    /* Right Section */
    .right {
      flex: 1;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin-top: 10px;
    }

    .label {
      background: orange;
      color: black;
      padding: 5px 10px;
      display: inline-block;
      margin-bottom: 10px;
      font-weight: bold;
      border-radius: 5px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #000;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Foodie</h1>
    <nav>
      <a href="#">Kitchen</a>
      <a href="#">Drink</a>
      <a href="#">Entertainment</a>
      <a href="#">Grocery</a>
      <a href="#">Restaurants</a>
      <a href="#">Travel</a>
    </nav>
  </header>

  <!-- Main Content -->
  <div class="container">

    <!-- Left Section -->
    <div class="left">
      <span class="tag">FAST FOOD</span>
      <img src="https://images.unsplash.com/photo-1585238342028-78d387f4a707" alt="Microwave">
    </div>

    <!-- Right Section -->
    <div class="right">

      <div class="card">
        <span class="label">RESTAURANTS</span>
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
        <h3>The Best Burger Joint In Every State, Hands Down</h3>
      </div>

      <div class="card">
        <span class="label">STORES AND CHAINS</span>
        <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c" alt="Store">
        <h3>Top Grocery Chains You Should Know</h3>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 | Himanshu Narwal - DevOps Engineer 🚀
  </footer>

</body>
</html>
